name: Deploy landing to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'packages/landing/**'
      - '.github/workflows/pages-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # GITHUB_TOKEN lifts the changelog's build-time GitHub API call out of
      # the 60 req/hr unauthenticated ceiling (shared-runner-IP 403s were
      # shipping an empty "No releases yet" changelog). `contents: read`
      # above is sufficient to read releases.
      - name: Build landing (next export)
        working-directory: packages/landing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/landing/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
